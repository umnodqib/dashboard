<!DOCTYPE html>
<html>
<head>
    <title>GHOST COMMANDER - Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Courier New', monospace;
            background-color: #0f0f1e;
            color: #ecf0f1;
        }

        .navbar {
            background: linear-gradient(135deg, #1a1a2e, #0f3460);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #2d2d4d;
        }

        .navbar h1 { font-size: 1.5rem; letter-spacing: 2px; }
        .navbar-stats { display: flex; gap: 2rem; }
        .container { padding: 2rem; max-width: 1400px; margin: 0 auto; }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid #2d2d4d;
        }

        .tab-btn {
            padding: 10px 20px;
            background: transparent;
            border: none;
            color: #ecf0f1;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            font-weight: bold;
        }

        .tab-btn.active {
            border-bottom-color: #0f3460;
            color: #0f3460;
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .panels-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        .panel-card {
            background: linear-gradient(135deg, #16213e, #0f3460);
            border: 2px solid #2d2d4d;
            border-radius: 8px;
            padding: 1.5rem;
            transition: all 0.3s;
        }

        .panel-card:hover {
            border-color: #0f3460;
            box-shadow: 0 0 20px rgba(15, 52, 96, 0.5);
        }

        .panel-slot { font-size: 1.5rem; font-weight: bold; margin-bottom: 1rem; }

        .status-badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: bold;
        }

        .status-badge.online { background-color: rgba(39, 174, 96, 0.3); color: #27ae60; }
        .status-badge.offline { background-color: rgba(231, 76, 60, 0.3); color: #e74c3c; }

        .panel-info { margin-top: 1rem; font-size: 0.85rem; }

        .panel-buttons {
            margin-top: 10px;
            gap: 5px;
            display: flex;
            flex-wrap: wrap;
        }

        .panel-buttons button {
            flex: 1;
            padding: 8px;
            background: #0f3460;
            cursor: pointer;
            border: none;
            color: #ecf0f1;
            border-radius: 4px;
            font-size: 0.8rem;
            transition: all 0.2s;
        }

        .panel-buttons button:hover { background: #1a5a8a; }
        .panel-buttons button.stop { background: #e74c3c; }
        .panel-buttons button.stop:hover { background: #c0392b; }

        .task-form {
            background: #16213e;
            border: 2px solid #0f3460;
            padding: 20px;
            border-radius: 8px;
            max-width: 600px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 10px;
            background: #0f1419;
            border: 1px solid #0f3460;
            color: #ecf0f1;
            border-radius: 4px;
            font-family: monospace;
        }

        .form-group textarea {
            min-height: 100px;
            resize: vertical;
        }

        .form-group button {
            width: 100%;
            padding: 12px;
            background: #0f3460;
            border: none;
            color: #ecf0f1;
            cursor: pointer;
            border-radius: 4px;
            font-weight: bold;
            transition: all 0.2s;
        }

        .form-group button:hover { background: #1a5a8a; }

        .command-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .command-item {
            background: #16213e;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #0f3460;
        }

        .command-item.pending { border-left-color: #f39c12; }
        .command-item.executing { border-left-color: #3498db; }
        .command-item.success { border-left-color: #27ae60; }
        .command-item.failed { border-left-color: #e74c3c; }

        .command-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5px;
        }

        .command-status {
            padding: 3px 8px;
            border-radius: 3px;
            font-size: 0.75rem;
            font-weight: bold;
        }

        .status-pending { background: rgba(243, 156, 18, 0.3); color: #f39c12; }
        .status-executing { background: rgba(52, 152, 219, 0.3); color: #3498db; }
        .status-success { background: rgba(39, 174, 96, 0.3); color: #27ae60; }
        .status-failed { background: rgba(231, 76, 60, 0.3); color: #e74c3c; }
    </style>
</head>
<body>
    <div class="navbar">
        <h1>👻 GHOST COMMANDER</h1>
        <div class="navbar-stats">
            <div>ONLINE: <span id="stat-online">0</span></div>
            <div>BUSY: <span id="stat-busy">0</span></div>
        </div>
    </div>

    <div class="container">
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('panels')">Panels</button>
            <button class="tab-btn" onclick="switchTab('task')">Send Task</button>
            <button class="tab-btn" onclick="switchTab('commands')">Command History</button>
        </div>

        <div id="panels" class="tab-content active">
            <h2>Active Panels</h2>
            <div class="panels-grid" id="panels-grid"></div>
        </div>

        <div id="task" class="tab-content">
            <h2>Send Task to Panel</h2>
            <div class="task-form">
                <div class="form-group">
                    <label>Select Panel (Slot):</label>
                    <select id="slot-select">
                        <option value="">-- Select Panel --</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Email Address:</label>
                    <input type="email" id="email-input" placeholder="example@gmail.com" required>
                </div>

                <div class="form-group">
                    <label>Password:</label>
                    <input type="password" id="password-input" placeholder="Enter password" required>
                </div>

                <div class="form-group">
                    <label>URLs (one per line):</label>
                    <textarea id="urls-input" placeholder="https://example.com/1&#10;https://example.com/2"></textarea>
                </div>

                <div class="form-group">
                    <button onclick="sendTask()">Send Task</button>
                </div>
            </div>
        </div>

        <div id="commands" class="tab-content">
            <h2>Command History</h2>
            <div id="command-list" class="command-list"></div>
        </div>
    </div>

    <script>
        const API_BASE = '/api';
        const AUTH_KEY = 'GHOST_SECRET_2026';

        document.addEventListener('DOMContentLoaded', function() {
            console.log('[INIT] Dashboard loaded');
            loadPanels();
            loadCommands();
            setInterval(loadPanels, 2000);
            setInterval(loadCommands, 3000);
        });

        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(tab).classList.add('active');
            event.target.classList.add('active');
        }

        async function loadPanels() {
            try {
                const response = await fetch(API_BASE + '/status', {
                    headers: { 'X-Auth-Key': AUTH_KEY }
                });
                const data = await response.json();
                console.log('[PANELS] Response:', data);
                renderPanels(data);
                if (data.panels && Array.isArray(data.panels)) {
                    updateSlotSelect(data.panels);
                }
            } catch (error) {
                console.error('[PANELS] Error:', error);
            }
        }

        function renderPanels(data) {
            const grid = document.getElementById('panels-grid');
            grid.innerHTML = '';
            
            if (!data) {
                grid.innerHTML = '<p>No data</p>';
                return;
            }

            const online = data.online || 0;
            const busy = data.busy || 0;
            const panels = data.panels || [];

            console.log('[RENDER] online=' + online + ' busy=' + busy + ' panels=' + panels.length);

            document.getElementById('stat-online').textContent = online;
            document.getElementById('stat-busy').textContent = busy;

            if (panels.length === 0) {
                grid.innerHTML = '<p>No panels connected</p>';
                return;
            }

            panels.forEach(function(panel) {
                const card = document.createElement('div');
                card.className = 'panel-card';
                card.innerHTML = 
                    '<div class="panel-slot">SLOT ' + panel.slot + '</div>' +
                    '<span class="status-badge ' + (panel.status || 'offline').toLowerCase() + '">' + (panel.status || 'OFFLINE') + '</span>' +
                    '<div class="panel-info">' +
                    '<div>IP: ' + (panel.ip || 'N/A') + '</div>' +
                    '<div>State: ' + (panel.state || 'UNKNOWN') + '</div>' +
                    '<div>Emails: ' + ((panel.data && panel.data.emails) || 0) + '</div>' +
                    '<div>Links: ' + ((panel.data && panel.data.links) || 0) + '</div>' +
                    '</div>' +
                    '<div class="panel-buttons">' +
                    '<button onclick="executeAction(' + panel.slot + ', ' + "'start_login'" + ')">Login</button>' +
                    '<button onclick="executeAction(' + panel.slot + ', ' + "'start_loop'" + ')">Loop</button>' +
                    '<button class="stop" onclick="executeAction(' + panel.slot + ', ' + "'stop'" + ')">Stop</button>' +
                    '</div>';
                grid.appendChild(card);
            });
        }

        function updateSlotSelect(panels) {
            const select = document.getElementById('slot-select');
            select.innerHTML = '<option value="">-- Select Panel --</option>';
            
            panels.forEach(function(panel) {
                const opt = document.createElement('option');
                opt.value = panel.slot;
                opt.textContent = 'Slot ' + panel.slot + ' (' + (panel.status || 'UNKNOWN') + ' - ' + (panel.state || 'UNKNOWN') + ')';
                select.appendChild(opt);
            });
        }

        async function sendTask() {
            const slot = parseInt(document.getElementById('slot-select').value);
            const email = document.getElementById('email-input').value;
            const password = document.getElementById('password-input').value;
            const urlsText = document.getElementById('urls-input').value;
            const urls = urlsText.split('\n').filter(u => u.trim());

            if (!slot || !email || !password || urls.length === 0) {
                alert('Please fill all fields!');
                return;
            }

            try {
                const response = await fetch(API_BASE + '/command/create', {
                    method: 'POST',
                    headers: {
                        'X-Auth-Key': AUTH_KEY,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        slot: slot,
                        action: 'start_login',
                        payload: {
                            email: email,
                            password: password,
                            urls: urls
                        }
                    })
                });

                if (response.ok) {
                    const data = await response.json();
                    alert('Task sent to Slot ' + slot);
                    document.getElementById('email-input').value = '';
                    document.getElementById('password-input').value = '';
                    document.getElementById('urls-input').value = '';
                    loadCommands();
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Error: ' + error.message);
            }
        }

        async function executeAction(slot, action) {
            try {
                await fetch(API_BASE + '/command/create', {
                    method: 'POST',
                    headers: {
                        'X-Auth-Key': AUTH_KEY,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        slot: slot,
                        action: action,
                        payload: {}
                    })
                });
                loadCommands();
            } catch (error) {
                console.error('Error:', error);
            }
        }

        async function loadCommands() {
            try {
                const response = await fetch(API_BASE + '/command/list', {
                    headers: { 'X-Auth-Key': AUTH_KEY }
                });
                const commands = await response.json();
                renderCommands(commands);
            } catch (error) {
                console.error('Error loading commands:', error);
            }
        }

        function renderCommands(commands) {
            const list = document.getElementById('command-list');
            
            if (!commands || commands.length === 0) {
                list.innerHTML = '<p>No commands yet</p>';
                return;
            }

            commands.sort(function(a, b) {
                return new Date(b.created_at || 0) - new Date(a.created_at || 0);
            });

            list.innerHTML = '';
            commands.forEach(function(cmd) {
                const item = document.createElement('div');
                item.className = 'command-item ' + ((cmd.status || 'pending').toLowerCase());
                item.innerHTML =
                    '<div class="command-header">' +
                    '<div><strong>Slot ' + cmd.slot + ' - ' + cmd.action + '</strong></div>' +
                    '<span class="command-status status-' + ((cmd.status || 'pending').toLowerCase()) + '">' + (cmd.status || 'PENDING').toUpperCase() + '</span>' +
                    '</div>' +
                    '<div style="font-size: 0.85rem; color: #999;">' +
                    'ID: ' + (cmd.id ? cmd.id.substring(0, 8) : 'N/A') + '...' +
                    '</div>';
                list.appendChild(item);
            });
        }
    </script>
</body>
</html>
