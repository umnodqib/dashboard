<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard UI</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: Arial, sans-serif;
        }
        .navbar {
            overflow: hidden;
            background-color: #333;
        }
        .navbar a {
            float: left;
            display: block;
            color: white;
            text-align: center;
            padding: 14px 16px;
            text-decoration: none;
        }
        .navbar a:hover {
            background-color: #ddd;
            color: black;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }
        th {
            background-color: #4CAF50;
            color: white;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <a href="#panels">Panels</a>
        <a href="#commands">Commands</a>
        <a href="#logs">Logs</a>
    </div>
    <div id="real-time-stats">
        <h2>Real-time Stats</h2>
        <p>Total Panels: <span id="total-panels">0</span></p>
        <p>Online: <span id="online">0</span></p>
        <p>Busy: <span id="busy">0</span></p>
        <p>Idle: <span id="idle">0</span></p>
        <p>Pending Commands: <span id="pending">0</span></p>
    </div>
    <div id="panels">
        <h2>Panels</h2>
        <div class="grid">
            <!-- Example panel item -->
            <div class="panel-item">
                <h3>Panel Name</h3>
                <p>Status: Online</p>
                <p>IP: 192.168.1.1</p>
                <p>State: Active</p>
                <p>Email/Link Counts: 5</p>
                <button>Start Login</button>
                <button>Start Loop</button>
                <button>Stop</button>
                <button>Clean RAM</button>
            </div>
            <!-- Add more panels here -->
        </div>
    </div>
    <div id="commands">
        <h2>Commands</h2>
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Slot</th>
                    <th>Action</th>
                    <th>Status</th>
                    <th>Created At</th>
                </tr>
            </thead>
            <tbody>
                <!-- Example command history entry -->
                <tr>
                    <td>1</td>
                    <td>Slot 1</td>
                    <td>Start Panel</td>
                    <td>Success</td>
                    <td>2026-04-23 08:34:25</td>
                </tr>
                <!-- Add more commands here -->
            </tbody>
        </table>
    </div>
    <script>
        setInterval(() => {
            // Logic to refresh panels every 5 seconds
            refreshPanels();
        }, 5000);

        setInterval(() => {
            // Logic to refresh commands every 2 seconds
            refreshCommands();
        }, 2000);

        function refreshPanels() {
            // Fetch and update panel data
        }

        function refreshCommands() {
            // Fetch and update command data
        }
    </script>
</body>
</html>
