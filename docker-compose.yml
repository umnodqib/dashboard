services:
  dashboard-backend:
    ports:
      - "5000:5000"  # Internal port
    expose:
      - "5000"  # For nginx proxy
  
  dashboard-frontend:
    ports:
      - "80:80"  # Public port
    volumes:
      - ./frontend:/usr/share/nginx/html
      - ./backend/nginx.conf:/etc/nginx/conf.d/default.conf
